<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>CORE CODE</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <main class="container">

    <h1>CORE CODE</h1>

    <p class="subtitle">
      性格ではなく、思考構造を解析する。
    </p>

    <section
      id="quiz"
      class="card"
    >

      <h2 id="question"></h2>

      <div id="answers"></div>

      <p id="count"></p>

    </section>

    <section
      id="result"
      class="card hidden"
    >

      <h2 id="resultCode"></h2>

      <h1 id="resultName"></h1>

      <div id="resultText"></div>

      <button onclick="location.reload()">
        もう一度診断する
      </button>

    </section>

  </main>

  <script src="typeData.js"></script>

  <script src="script.js"></script>

</body>
</html>
