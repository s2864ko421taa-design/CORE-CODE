<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE CODE</title>
<style>
body{
background:#0d0d12;
color:white;
font-family:sans-serif;
margin:0;
padding:0;
}
.container{
width:90%;
max-width:700px;
margin:auto;
padding:40px 0;
}
h1{
text-align:center;
font-size:50px;
}
.subtitle{
text-align:center;
color:#999;
margin-bottom:40px;
}
.card{
background:#171721;
padding:30px;
border-radius:20px;
}
#question{
font-size:28px;
margin-bottom:30px;
}
button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:12px;
background:#7c3cff;
color:white;
font-size:16px;
cursor:pointer;
}
.progress{
width:100%;
height:10px;
background:#2a2a35;
border-radius:999px;
overflow:hidden;
margin-top:30px;
}
#bar{
width:0%;
height:100%;
background:#7c3cff;
transition:0.3s;
}
#count{
text-align:right;
color:#888;
margin-top:10px;
}
.hidden{
display:none;
}
#result{
margin-top:40px;
background:#171721;
padding:30px;
border-radius:20px;
text-align:center;
}
#resultCode{
font-size:40px;
color:#7c3cff;
}
#resultName{
font-size:36px;
margin-top:10px;
}
#resultText{
margin-top:20px;
color:#ccc;
line-height:1.8;
}
</style>
</head>
<body>
<div class="container">
<h1>CORE CODE</h1>
<p class="subtitle">
性格ではなく、思考構造を解析する。
</p>
<div class="card">
<h2 id="question"></h2>
<div id="answers"></div>
<div class="progress">
<div id="bar"></div>
</div>
<p id="count"></p>
</div>
<div id="result" class="hidden">
<h2 id="resultCode"></h2>
<h1 id="resultName"></h1>
<p id="resultText"></p>
<button onclick="location.reload()">
もう一度診断する
</button>
</div>
</div>
<script>
const questions = [
{
q:"意味が分からないことをやれと言われた時どうする？",
a:[
["とりあえず動く","D"],
["理由を聞く","I"],
["空気を読む","A"],
["安心できるならやる","Y"]
]
},
{
q:"一番モチベーションが上がる瞬間は？",
a:[
["欲しいものがある時","D"],
["理解できた時","I"],
["感情が動いた時","A"],
["安心できた時","Y"]
]
},
{
q:"行動する時に重要なのは？",
a:[
["勢い","D"],
["納得","I"],
["気持ち","A"],
["安定","Y"]
]
},
{
q:"楽しいと感じやすいのは？",
a:[
["刺激","D"],
["学び","I"],
["感情共有","A"],
["落ち着き","Y"]
]
},
{
q:"人から止められた時どう思う？",
a:[
["やってから考える","D"],
["理由次第","I"],
["気持ちは分かる","A"],
["不安になる","Y"]
]
}
];
const typeNames = {
DS:"突破者",
DJ:"戦術家",
DK:"統率者",
DL:"執念者",
YS:"守護者",
YJ:"支援者",
YK:"調律者",
YL:"分析者",
AS:"表現者",
AJ:"語り手",
AK:"共鳴者",
AL:"感情探究者",
IS:"解析者",
IJ:"理論家",
IK:"策略家",
IL:"深層探究者"
};
const typeText = {
DS:"欲しいものへ一直線に突き進むタイプ。",
DJ:"勝つ流れを組み立てるタイプ。",
DK:"全体を動かし統率するタイプ。",
DL:"興味や欲望を極限まで掘るタイプ。",
YS:"安心できる日常を守るタイプ。",
YJ:"周囲を支え流れを整えるタイプ。",
YK:"全体のバランスを整えるタイプ。",
YL:"壊れない道を探す慎重分析タイプ。",
AS:"感情をそのまま表に出すタイプ。",
AJ:"感情や物語を紡ぐタイプ。",
AK:"周囲の感情と響き合うタイプ。",
AL:"感情の深層を掘り下げるタイプ。",
IS:"瞬時に理解し答えを探すタイプ。",
IJ:"理論で世界を整理するタイプ。",
IK:"全体を読み勝ち筋を作るタイプ。",
IL:"物事の根本を掘り続けるタイプ。"
};
let current = 0;
let scores = {
D:0,
Y:0,
A:0,
I:0,
S:0,
J:0,
K:0,
L:0,
O:0,
C:0,
G:0,
T:0,
Q:0,
U:0,
F:0,
N:0
};
const questionEl =
document.getElementById("question");
const answersEl =
document.getElementById("answers");
const countEl =
document.getElementById("count");
const bar =
document.getElementById("bar");
const resultEl =
document.getElementById("result");
const resultCode =
document.getElementById("resultCode");
const resultName =
document.getElementById("resultName");
const resultText =
document.getElementById("resultText");
function showQuestion(){
const q = questions[current];
questionEl.innerText = q.q;
answersEl.innerHTML = "";
countEl.innerText =
(current + 1) + " / " + questions.length;
bar.style.width =
((current + 1) / questions.length * 100) + "%";
q.a.forEach(function(answer){
const btn =
document.createElement("button");
btn.innerText = answer[0];
btn.onclick = function(){
scores[answer[1]]++;
current++;
if(current < questions.length){
showQuestion();
}else{
showResult();
}
};
answersEl.appendChild(btn);
});
}
function top(codes){
return codes.sort(function(a,b){
return scores[b] - scores[a];
})[0];
}
function showResult(){
document.querySelector(".card")
.style.display = "none";
resultEl.classList.remove("hidden");
const energy =
top(["D","Y","A","I"]);
const thinking =
top(["S","J","K","L"]);
const mainCode =
energy + thinking;
resultCode.innerText =
mainCode;
resultName.innerText =
typeNames[mainCode];
resultText.innerText =
typeText[mainCode];
}
showQuestion();
</script>
</body>
</html>
