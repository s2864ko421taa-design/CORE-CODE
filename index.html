<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORE CODE</title>

<style>

body{
background:#0d0d12;
color:white;
font-family:sans-serif;
margin:0;
padding:0;
}

.container{
width:90%;
max-width:700px;
margin:auto;
padding:40px 0;
}

h1{
text-align:center;
font-size:52px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#888;
margin-bottom:40px;
}

.card{
background:#171721;
padding:30px;
border-radius:20px;
}

#question{
font-size:28px;
margin-bottom:25px;
line-height:1.5;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:12px;
background:#7c3cff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.progress{
width:100%;
height:10px;
background:#2a2a35;
border-radius:999px;
overflow:hidden;
margin-top:30px;
}

#bar{
width:0%;
height:100%;
background:#7c3cff;
transition:0.3s;
}

#count{
text-align:right;
color:#888;
margin-top:10px;
}

.hidden{
display:none;
}

#result{
margin-top:40px;
background:#171721;
padding:30px;
border-radius:20px;
text-align:center;
}

#resultCode{
font-size:42px;
color:#7c3cff;
}

#resultName{
font-size:34px;
margin-top:10px;
}

#resultText{
margin-top:20px;
color:#ccc;
line-height:1.8;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>CORE CODE</h1>

<p class="subtitle">
性格ではなく、思考構造を解析する。
</p>

<div class="card" id="quiz">

<h2 id="question"></h2>

<div id="answers"></div>

<div class="progress">
<div id="bar"></div>
</div>

<p id="count"></p>

</div>

<div id="result" class="hidden">

<h2 id="resultCode"></h2>

<h1 id="resultName"></h1>

<p id="resultText"></p>

<button onclick="location.reload()">
もう一度診断する
</button>

</div>

</div>

<script>

const questions = [

{
q:"初めての場所でどう動く？",
a:[
["直感で動く","D"],
["まず観察する","I"],
["空気を読む","A"],
["安全を確認する","Y"]
]
},

{
q:"一番大事なのは？",
a:[
["行動力","D"],
["理解力","I"],
["感情","A"],
["安定","Y"]
]
},

{
q:"考える時どうなる？",
a:[
["即決","S"],
["分析","J"],
["全体を見る","K"],
["深く掘る","L"]
]
},

{
q:"人間関係で欲しいものは？",
a:[
["刺激","D"],
["信頼","Y"],
["共感","A"],
["知性","I"]
]
},

{
q:"楽しいと感じる瞬間は？",
a:[
["挑戦","S"],
["勝利","J"],
["調和","K"],
["探求","L"]
]
}

];

const typeNames = {

DS:"突破者",
DJ:"戦術家",
DK:"統率者",
DL:"執念者",

YS:"守護者",
YJ:"支援者",
YK:"調律者",
YL:"分析者",

AS:"表現者",
AJ:"語り手",
AK:"共鳴者",
AL:"感情探究者",

IS:"解析者",
IJ:"理論家",
IK:"策略家",
IL:"深層探究者"

};

const typeText = {

DS:"欲しいものへ一直線に突き進む。",
DJ:"勝つための流れを作る。",
DK:"全体を導き動かす。",
DL:"限界まで物事を追い続ける。",

YS:"安心できる世界を守る。",
YJ:"人を支え流れを整える。",
YK:"全体のバランスを調律する。",
YL:"壊れない道を探し続ける。",

AS:"感情をそのまま表現する。",
AJ:"言葉と感情を紡ぐ。",
AK:"人と感情を共鳴させる。",
AL:"感情の深層を探究する。",

IS:"瞬時に理解して動く。",
IJ:"理論で世界を整理する。",
IK:"盤面を読み勝ち筋を作る。",
IL:"真理を深く掘り続ける。"

};

let current = 0;

let scores = {
D:0,
Y:0,
A:0,
I:0,
S:0,
J:0,
K:0,
L:0
};

const questionEl =
document.getElementById("question");

const answersEl =
document.getElementById("answers");

const countEl =
document.getElementById("count");

const bar =
document.getElementById("bar");

const resultEl =
document.getElementById("result");

const resultCode =
document.getElementById("resultCode");

const resultName =
document.getElementById("resultName");

const resultText =
document.getElementById("resultText");

function showQuestion(){

const q = questions[current];

questionEl.innerText = q.q;

answersEl.innerHTML = "";

countEl.innerText =
(current + 1) + " / " + questions.length;

bar.style.width =
((current + 1) / questions.length * 100) + "%";

q.a.forEach(answer => {

const btn =
document.createElement("button");

btn.innerText = answer[0];

btn.onclick = () => {

scores[answer[1]]++;

current++;

if(current < questions.length){

showQuestion();

}else{

showResult();

}

};

answersEl.appendChild(btn);

});

}

function top(arr){

return arr.sort((a,b)=>
scores[b]-scores[a])[0];

}

function showResult(){

document.getElementById("quiz")
.classList.add("hidden");

resultEl.classList.remove("hidden");

const energy =
top(["D","Y","A","I"]);

const thinking =
top(["S","J","K","L"]);

const code =
energy + thinking;

resultCode.innerText = code;

resultName.innerText =
typeNames[code];

resultText.innerText =
typeText[code];

}

showQuestion();

</script>

</body>
</html>
