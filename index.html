<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORE CODE</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>CORE CODE</h1>

    <p class="subtitle">
      性格ではなく、思考構造を解析する。
    </p>

    <div class="card">

      <h2 id="question"></h2>

      <div id="answers"></div>

      <div class="progress">
        <div id="bar"></div>
      </div>

      <p id="count"></p>

    </div>

    <div id="result" class="hidden">

      <h2 id="resultCode"></h2>

      <h1 id="resultName"></h1>

      <p id="resultText"></p>

      <button onclick="location.reload()">
        もう一度診断する
      </button>

    </div>

  </div>

  <script>
alert("JS成功");
document.getElementById("question").innerText = "質問表示成功";
</script>

</body>
</html>
